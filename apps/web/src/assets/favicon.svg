<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <title>EmberQuant</title>

  <!-- Rounded dark background -->
  <rect width="400" height="400" rx="80" fill="#160A02"/>

  <!-- Orbit ring (back half, dim) -->
  <path d="M200,148 A148,52 0 0,0 200,252"
    transform="rotate(-30, 200, 200)"
    fill="none" stroke="#6B2C0A" stroke-width="13" stroke-linecap="round"/>

  <!-- Orbit ring (front half, bright) -->
  <path d="M200,252 A148,52 0 0,0 200,148"
    transform="rotate(-30, 200, 200)"
    fill="none" stroke="#C4521A" stroke-width="13" stroke-linecap="round"/>

  <!-- Orbit accent highlight arc -->
  <path d="M200,148 A148,52 0 0,0 72,200"
    transform="rotate(-30, 200, 200)"
    fill="none" stroke="#E8721A" stroke-width="16" stroke-linecap="round" opacity="0.85"/>

  <!-- Center star covers orbit crossing -->
  <circle cx="200" cy="200" r="46" fill="#160A02"/>

  <!-- Planet at right end of orbit (rotated -30°) -->
  <!-- right end: (348,200) → rotate-30 → (328, 126) -->
  <circle cx="328" cy="126" r="30" fill="#7A2E08"/>
  <circle cx="328" cy="126" r="20" fill="#D4621A"/>
  <circle cx="328" cy="126" r="9"  fill="#F4C06A"/>

  <!-- Central star layers -->
  <circle cx="200" cy="200" r="38" fill="#200C02"/>
  <circle cx="200" cy="200" r="26" fill="#6A2808"/>
  <circle cx="200" cy="200" r="17" fill="#C04C14"/>
  <circle cx="200" cy="200" r="9"  fill="#ECA050"/>
  <circle cx="200" cy="200" r="4"  fill="#F8EAC4"/>
</svg>
