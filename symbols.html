<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>标的数据展示</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; }
  .header-bar {
    display: flex; align-items: center; justify-content: space-between; padding: 12px 20px;
    background: #fff; border-bottom: 2px solid #3498db; gap: 16px;
  }
  .header-bar h1 { margin: 0; font-size: 1.4rem; color: #2c3e50; flex: 1; text-align: center; }
  .btn-sync {
    padding: 8px 16px; font-size: .9rem; border: 1px solid #3498db; border-radius: 6px;
    background: #3498db; color: #fff; cursor: pointer; white-space: nowrap;
  }
  .btn-sync:hover { background: #2980b9; border-color: #2980b9; }
  .btn-sync:disabled { opacity: .6; cursor: not-allowed; }
  #loading { text-align: center; padding: 80px 20px; font-size: 1.1rem; color: #7f8c8d; }
  #loading code { background: #f0f2f5; padding: 2px 6px; border-radius: 3px; font-size: .9rem; }

  /* 同步进度模态框 */
  .sync-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 9999;
    align-items: center; justify-content: center;
  }
  .sync-modal-overlay.show { display: flex; }
  .sync-modal {
    background: #fff; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.2);
    min-width: 360px; max-width: 90vw; padding: 24px;
  }
  .sync-modal h3 { margin: 0 0 16px; font-size: 1.2rem; color: #2c3e50; }
  .sync-modal .sync-status { font-size: 1rem; color: #555; margin-bottom: 16px; min-height: 1.5em; }
  .sync-modal .sync-progress-bar {
    height: 8px; background: #ecf0f1; border-radius: 4px; overflow: hidden; margin-bottom: 16px;
  }
  .sync-modal .sync-progress-fill {
    height: 100%; background: #3498db; border-radius: 4px; width: 0%; transition: width .3s;
  }
  .sync-modal .sync-progress-fill.indeterminate {
    width: 30%; animation: sync-pulse 1.5s ease-in-out infinite;
  }
  @keyframes sync-pulse { 0%, 100% { transform: translateX(-100%); } 50% { transform: translateX(300%); } }
  .sync-modal .sync-actions { text-align: right; }
  .sync-modal .btn-close {
    padding: 8px 20px; font-size: .9rem; border: 1px solid #d5d8dc; border-radius: 6px;
    background: #fff; color: #555; cursor: pointer;
  }
  .sync-modal .btn-close:hover { background: #f4f6f8; border-color: #3498db; color: #3498db; }
  .sync-modal.sync-done .sync-progress-fill { width: 100%; background: #27ae60; }
  .sync-modal.sync-error .sync-progress-fill { width: 100%; background: #e74c3c; }

  /* ── K 线视图：左右分栏 ── */
  .kline-view { display: flex; height: calc(100vh - 60px); overflow: hidden; }
  .kline-sidebar {
    width: 280px; flex-shrink: 0; display: flex; flex-direction: column;
    border-right: 1px solid #e0e6ef; background: #fff;
  }
  .kline-filter-bar {
    padding: 10px 12px; border-bottom: 1px solid #e8ecf0; flex-shrink: 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  .kline-filter-row { display: flex; align-items: center; gap: 6px; }
  .kline-filter-row label { font-size: .75rem; color: #7f8c8d; min-width: 42px; }
  .kline-filter-row select, .kline-filter-row input {
    flex: 1; padding: 4px 8px; border: 1px solid #d5d8dc; border-radius: 4px; font-size: .82rem;
  }
  .kline-filter-row .filter-sep { color: #bbb; font-size: .8rem; }
  .btn-reset {
    padding: 4px 10px; font-size: .78rem; border: 1px solid #d5d8dc; border-radius: 4px;
    background: #fff; color: #666; cursor: pointer;
  }
  .btn-reset:hover { border-color: #e74c3c; color: #e74c3c; }
  .kline-list { flex: 1; overflow-y: auto; }
  .kline-list table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .kline-list th { background: #f4f6f8; padding: 8px 10px; text-align: left; font-weight: 600; color: #555; cursor: pointer; user-select: none; }
  .kline-list th:hover { background: #e8ecf0; }
  .kline-list th.sortable::after { content: ' ↕'; opacity: .5; font-size: .75em; }
  .kline-list th.sort-asc::after { content: ' ↑'; opacity: 1; }
  .kline-list th.sort-desc::after { content: ' ↓'; opacity: 1; }
  .kline-list td { padding: 6px 10px; border-bottom: 1px solid #f0f2f5; }
  .kline-list tr { cursor: pointer; }
  .kline-list tr:hover { background: #f4f6f8; }
  .kline-list tr.selected { background: #eaf4fd; border-left: 3px solid #3498db; }
  .kline-chart-area { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 12px; background: #fff; }
  .kline-chart-area .placeholder {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: #95a5a6; font-size: 1rem; background: #fafbfc; border: 1px dashed #e0e6ef; border-radius: 8px;
  }
  .kline-chart-wrap { flex: 1; min-height: 0; }
  .kline-chart-wrap canvas { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>

<div class="header-bar">
  <h1>标的数据展示</h1>
  <button type="button" class="btn-sync" id="btnSync">数据同步</button>
</div>

<div id="loading">⏳ 数据加载中…</div>

<div class="sync-modal-overlay" id="syncModal">
  <div class="sync-modal">
    <h3>数据同步</h3>
    <div class="sync-status" id="syncModalStatus">准备中…</div>
    <div class="sync-progress-bar">
      <div class="sync-progress-fill" id="syncModalProgress"></div>
    </div>
    <div class="sync-actions">
      <button type="button" class="btn-close" id="syncModalClose" style="display:none">关闭</button>
    </div>
  </div>
</div>

<div class="kline-view" id="mainContent" style="display:none">
  <aside class="kline-sidebar">
    <div class="kline-filter-bar">
      <div class="kline-filter-row">
        <label>周期</label>
        <select id="intervalSelect">
          <option value="1d">日线</option>
          <option value="4h">4 小时</option>
          <option value="1h">1 小时</option>
        </select>
      </div>
      <div class="kline-filter-row">
        <label>策略</label>
        <select id="strategySelect"></select>
      </div>
      <div class="kline-filter-row">
        <label>搜索</label>
        <input type="text" id="symbolSearch" placeholder="输入交易对…">
      </div>
      <button type="button" class="btn-reset" id="btnReset">重置</button>
    </div>
    <div class="kline-list">
      <table>
        <thead><tr>
          <th class="sortable" data-sort="symbol">交易对</th>
          <th class="sortable" data-sort="stop_loss_pct">stop_loss_pct</th>
          <th class="sortable" data-sort="risk_reward_ratio">risk_reward_ratio</th>
        </tr></thead>
        <tbody id="symbolTbody"></tbody>
      </table>
    </div>
  </aside>
  <main class="kline-chart-area">
    <div id="chartHeader" style="padding: 8px 0; font-size: 1.1rem; font-weight: 600; color: #2c3e50; border-bottom: 1px solid #e0e6ef; margin-bottom: 8px; display: none;">
      <span id="chartSymbolName"></span>
      <span id="chartParams" style="color: #7f8c8d; font-weight: 400; font-size: 0.95rem; margin-left: 8px;"></span>
    </div>
    <div id="chartPlaceholder" class="placeholder">点击左侧标的加载 K 线图</div>
    <div id="klineChartWrap" class="kline-chart-wrap" style="display:none"></div>
  </main>
</div>

<script>
(function() {
  var _allSymbols = [];
  var _filteredSymbols = [];
  var _sortColumn = 'symbol';
  var _sortOrder = 'asc';
  var _currentInterval = '1d';
  var _currentSymbol = null;  // 当前选中的标的，用于切换周期时重新加载 K 线
  var _klineChart = null;

  function showLoading(msg) {
    var el = document.getElementById('loading');
    el.style.display = 'block';
    el.innerHTML = msg || '⏳ 数据加载中…';
    document.getElementById('mainContent').style.display = 'none';
  }

  function hideLoading() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainContent').style.display = 'flex';
  }

  function showError(msg) {
    var el = document.getElementById('loading');
    el.style.display = 'block';
    el.innerHTML = '⚠ ' + msg + '<br><br><code>请通过 python serve_symbols.py 启动本地服务器。</code>';
    document.getElementById('mainContent').style.display = 'none';
  }

  function fetchIntervals() {
    return fetch('/api/intervals').then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function fetchStrategies() {
    return fetch('/api/strategies').then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function initStrategySelect(strategies) {
    var sel = document.getElementById('strategySelect');
    sel.innerHTML = strategies.map(function(s) {
      return '<option value="' + (s.id || '') + '">' + (s.name || s.id || '') + '</option>';
    }).join('');
  }

  function fetchSymbols(interval, strategy) {
    var url = '/api/symbols?interval=' + encodeURIComponent(interval);
    if (strategy) url += '&strategy=' + encodeURIComponent(strategy);
    return fetch(url).then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function fetchKlines(interval, symbol) {
    return fetch('/api/klines/' + interval + '/' + encodeURIComponent(symbol) + '.csv').then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' – ' + symbol);
      return r.text();
    });
  }

  function sortFilteredSymbols() {
    var col = _sortColumn;
    var asc = _sortOrder === 'asc';
    _filteredSymbols.sort(function(a, b) {
      var va, vb;
      if (col === 'symbol') {
        va = (a.symbol || '').toLowerCase();
        vb = (b.symbol || '').toLowerCase();
        return asc ? (va < vb ? -1 : va > vb ? 1 : 0) : (vb < va ? -1 : vb > va ? 1 : 0);
      }
      va = (a[col] != null && !isNaN(a[col])) ? +a[col] : -Infinity;
      vb = (b[col] != null && !isNaN(b[col])) ? +b[col] : -Infinity;
      if (va < vb) return asc ? -1 : 1;
      if (va > vb) return asc ? 1 : -1;
      return 0;
    });
  }

  function updateHeaderSortClasses() {
    var ths = document.querySelectorAll('.kline-list th[data-sort]');
    ths.forEach(function(th) {
      th.classList.remove('sort-asc', 'sort-desc');
      if (th.getAttribute('data-sort') === _sortColumn) {
        th.classList.add(_sortOrder === 'asc' ? 'sort-asc' : 'sort-desc');
      }
    });
  }

  function onHeaderClick(column) {
    if (_sortColumn === column) {
      _sortOrder = _sortOrder === 'asc' ? 'desc' : 'asc';
    } else {
      _sortColumn = column;
      _sortOrder = 'asc';
    }
    sortFilteredSymbols();
    renderSymbolList();
    updateHeaderSortClasses();
  }

  function applyFilters() {
    var search = document.getElementById('symbolSearch').value.trim().toLowerCase();

    _filteredSymbols = _allSymbols.filter(function(s) {
      if (search && s.symbol.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });

    sortFilteredSymbols();
    renderSymbolList();
    updateHeaderSortClasses();
  }

  function renderSymbolList() {
    var tbody = document.getElementById('symbolTbody');
    var html = _filteredSymbols.slice(0, 500).map(function(s) {
      var sel = s.symbol === _currentSymbol ? 'selected' : '';
      var sl = (s.stop_loss_pct != null && !isNaN(s.stop_loss_pct)) ? s.stop_loss_pct.toFixed(2) + '%' : '-';
      var rr = (s.risk_reward_ratio != null && !isNaN(s.risk_reward_ratio)) ? s.risk_reward_ratio.toFixed(2) : '-';
      return '<tr data-symbol="' + s.symbol + '" class="' + sel + '" onclick="onSymbolClick(event, \'' + s.symbol + '\')">' +
        '<td>' + s.symbol + '</td><td>' + sl + '</td><td>' + rr + '</td></tr>';
    }).join('');
    if (_filteredSymbols.length > 500) {
      html += '<tr><td colspan="3" style="color:#95a5a6;font-size:.8rem">仅显示前 500 个，请缩小搜索范围</td></tr>';
    }
    tbody.innerHTML = html || '<tr><td colspan="3" style="color:#95a5a6">无匹配标的</td></tr>';
  }

  window.onSymbolClick = function(ev, symbol) {
    _currentSymbol = symbol;
    document.querySelectorAll('.kline-list tr.selected').forEach(function(r) { r.classList.remove('selected'); });
    var row = ev.currentTarget;
    row.classList.add('selected');
    loadKline(symbol);
  };

  function loadKline(symbol) {
    var wrap = document.getElementById('klineChartWrap');
    var placeholder = document.getElementById('chartPlaceholder');
    var chartHeader = document.getElementById('chartHeader');
    var chartSymbolName = document.getElementById('chartSymbolName');
    var chartParams = document.getElementById('chartParams');
    wrap.style.display = 'none';
    placeholder.style.display = 'flex';
    chartHeader.style.display = 'none';
    placeholder.textContent = '加载 K 线数据…';

    fetchKlines(_currentInterval, symbol)
      .then(function(csvText) {
        var klines = _parseCsvKlines(csvText);
        if (!klines.length) {
          placeholder.textContent = '无有效 K 线数据';
          return;
        }
        placeholder.style.display = 'none';
        wrap.style.display = 'block';
        chartHeader.style.display = 'block';
        chartSymbolName.textContent = symbol;
        // 获取最新的 stop_loss_pct 和 risk_reward_ratio
        var lastKline = klines[klines.length - 1];
        var sl = lastKline.stop_loss_pct != null ? lastKline.stop_loss_pct.toFixed(2) : '-';
        var rr = lastKline.risk_reward_ratio != null ? lastKline.risk_reward_ratio.toFixed(2) : '-';
        chartParams.textContent = '(' + sl + ', ' + rr + ')';
        if (!_klineChart) {
          _klineChart = echarts.init(document.getElementById('klineChartWrap'));
        }
        requestAnimationFrame(function() {
          _renderKlineChart(_klineChart, klines);
          _klineChart.resize();
        });
      })
      .catch(function(err) {
        placeholder.textContent = '加载失败：' + err.message;
        placeholder.style.display = 'flex';
        wrap.style.display = 'none';
        chartHeader.style.display = 'none';
      });
  }

  function _parseCsvKlines(csvText) {
    var lines = csvText.split('\n');
    if (lines.length < 2) return [];

    var headers = lines[0].replace(/^\uFEFF/, '').split(',').map(function(h) { return h.trim(); });
    function ci(name) { return headers.indexOf(name); }

    var iT = ci('open_time'), iO = ci('open'), iH = ci('high'), iL = ci('low'), iC = ci('close');
    var iMA5 = ci('MA5'), iMA30 = ci('MA30'), iMA60 = ci('MA60'), iMA120 = ci('MA120'), iMA240 = ci('MA240');
    var iDIF = ci('DIF'), iDEA = ci('DEA'), iMACD = ci('MACD');
    var iK = ci('KDJ.K'), iD = ci('KDJ.D'), iJ = ci('KDJ.J');
    var iStopLossPct = ci('stop_loss_pct'), iRiskReward = ci('risk_reward_ratio');

    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      var c = line.split(',');
      rows.push({
        t: c[iT],
        o: parseFloat(c[iO]),
        h: parseFloat(c[iH]),
        l: parseFloat(c[iL]),
        c: parseFloat(c[iC]),
        ma5: iMA5 >= 0 ? parseFloat(c[iMA5]) : null,
        ma30: iMA30 >= 0 ? parseFloat(c[iMA30]) : null,
        ma60: iMA60 >= 0 ? parseFloat(c[iMA60]) : null,
        ma120: iMA120 >= 0 ? parseFloat(c[iMA120]) : null,
        ma240: iMA240 >= 0 ? parseFloat(c[iMA240]) : null,
        dif: iDIF >= 0 ? parseFloat(c[iDIF]) : null,
        dea: iDEA >= 0 ? parseFloat(c[iDEA]) : null,
        macd: iMACD >= 0 ? parseFloat(c[iMACD]) : null,
        k: iK >= 0 ? parseFloat(c[iK]) : null,
        d: iD >= 0 ? parseFloat(c[iD]) : null,
        j: iJ >= 0 ? parseFloat(c[iJ]) : null,
        stop_loss_pct: iStopLossPct >= 0 ? parseFloat(c[iStopLossPct]) : null,
        risk_reward_ratio: iRiskReward >= 0 ? parseFloat(c[iRiskReward]) : null,
      });
    }
    return rows;
  }

  function _renderKlineChart(chart, klines) {
    var times = klines.map(function(k) { return k.t; });
    var ohlc = klines.map(function(k) { return [k.o, k.c, k.l, k.h]; });
    var ma5 = klines.map(function(k) { return k.ma5; });
    var ma30 = klines.map(function(k) { return k.ma30; });
    var ma60 = klines.map(function(k) { return k.ma60; });
    var ma120 = klines.map(function(k) { return k.ma120; });
    var ma240 = klines.map(function(k) { return k.ma240; });
    var stopLossPct = klines.map(function(k) { return k.stop_loss_pct; });
    var riskRewardRatio = klines.map(function(k) { return k.risk_reward_ratio; });
    var dif = klines.map(function(k) { return k.dif; });
    var dea = klines.map(function(k) { return k.dea; });
    var macdRaw = klines.map(function(k) { return k.macd; });
    var macd = macdRaw.map(function(v, i) {
      if (v === null || v === undefined) return null;
      var prev = i > 0 ? macdRaw[i - 1] : v;
      var isHollow = prev !== null && v > prev;
      var baseColor = v >= 0 ? '#e74c3c' : '#27ae60';
      return { value: v, itemStyle: { color: isHollow ? 'transparent' : baseColor, borderColor: baseColor, borderWidth: 1.5 } };
    });
    var kLine = klines.map(function(k) { return k.k; });
    var dLine = klines.map(function(k) { return k.d; });
    var jLine = klines.map(function(k) { return k.j; });

    var sp = 0, ep = 100;
    if (times.length > 200) {
      sp = ((times.length - 200) / times.length) * 100;
      ep = 100;
    }

    function fsig(v, sig) {
      if (v == null || isNaN(+v)) return '-';
      var x = +v;
      if (x === 0) return '0';
      sig = sig !== undefined ? sig : 4;
      var magnitude = Math.floor(Math.log10(Math.abs(x)));
      var decPlaces = Math.max(sig - 1 - magnitude, 0);
      return x.toFixed(decPlaces);
    }
    function clampIdx(idx, arr) { return Math.max(0, Math.min(idx, arr.length - 1)); }
    function trend(curr, prev) {
      if (curr == null || prev == null || isNaN(+curr) || isNaN(+prev)) return '';
      var c = +curr, p = +prev;
      if (c > p + 1e-10) return ' ↑';
      if (c < p - 1e-10) return ' ↓';
      return ' →';
    }
    function fv(v, d) { return (v != null && !isNaN(+v)) ? (+v).toFixed(d !== undefined ? d : 4) : '-'; }
    var fi = 0;
    function buildMAText(idx) {
      var i = clampIdx(idx, ma5), j = Math.max(0, i - 1);
      return '{ma5val|MA5: ' + fv(ma5[i], 4) + trend(ma5[i], ma5[j]) + '}   '
        + '{ma30val|MA30: ' + fv(ma30[i], 4) + trend(ma30[i], ma30[j]) + '}   '
        + '{ma60val|MA60: ' + fv(ma60[i], 4) + trend(ma60[i], ma60[j]) + '}   '
        + '{ma120val|MA120: ' + fv(ma120[i], 4) + trend(ma120[i], ma120[j]) + '}   '
        + '{ma240val|MA240: ' + fv(ma240[i], 4) + trend(ma240[i], ma240[j]) + '}';
    }
    function buildMacdText(idx) {
      var i = clampIdx(idx, macdRaw), j = Math.max(0, i - 1);
      return '{difval|DIF: ' + fsig(dif[i], 6) + trend(dif[i], dif[j]) + '}   '
        + '{deaval|DEA: ' + fsig(dea[i], 6) + trend(dea[i], dea[j]) + '}   '
        + '{macdval|MACD: ' + fsig(macdRaw[i], 6) + trend(macdRaw[i], macdRaw[j]) + '}';
    }
    function buildKdjText(idx) {
      var i = clampIdx(idx, kLine), j = Math.max(0, i - 1);
      return '{kval|K: ' + fv(kLine[i], 2) + trend(kLine[i], kLine[j]) + '}   '
        + '{dval|D: ' + fv(dLine[i], 2) + trend(dLine[i], dLine[j]) + '}   '
        + '{jval|J: ' + fv(jLine[i], 2) + trend(jLine[i], jLine[j]) + '}';
    }
    function buildStopRiskText(idx) {
      var i = clampIdx(idx, stopLossPct), j = Math.max(0, i - 1);
      return '{slval|stop_loss_pct: ' + fv(stopLossPct[i], 2) + '%' + trend(stopLossPct[i], stopLossPct[j]) + '}   '
        + '{rrval|risk_reward_ratio: ' + fv(riskRewardRatio[i], 2) + trend(riskRewardRatio[i], riskRewardRatio[j]) + '}';
    }
    var RICH_MA = { ma5val: { fill: '#3498db', fontSize: 11 }, ma30val: { fill: '#e74c3c', fontSize: 11 },
      ma60val: { fill: '#27ae60', fontSize: 11 }, ma120val: { fill: '#e67e22', fontSize: 11 },
      ma240val: { fill: '#9b59b6', fontSize: 11 } };
    var RICH_MACD = { difval: { fill: '#3498db', fontSize: 11 }, deaval: { fill: '#e74c3c', fontSize: 11 },
      macdval: { fill: '#888', fontSize: 11 } };
    var RICH_KDJ = { kval: { fill: '#3498db', fontSize: 11 }, dval: { fill: '#f39c12', fontSize: 11 },
      jval: { fill: '#9b59b6', fontSize: 11 } };
    var RICH_STOP_RISK = { slval: { fill: '#e74c3c', fontSize: 11 }, rrval: { fill: '#27ae60', fontSize: 11 } };

    var option = {
      backgroundColor: '#fff',
      animation: false,
      tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'cross', lineStyle: { color: '#aaa', type: 'dashed' } },
        formatter: function(params) {
          if (!params.length) return '';
          var html = '<div style="font-size:11px;line-height:1.8"><b>' + params[0].axisValue + '</b><br>';
          params.forEach(function(p) {
            if (p.seriesName === 'K线' && Array.isArray(p.value)) {
              var o = +p.value[1], c = +p.value[2], l = +p.value[3], h = +p.value[4];
              var ref = Math.abs(c) || Math.abs(o) || 1;
              var dec = ref >= 1000 ? 2 : ref >= 100 ? 3 : ref >= 10 ? 4 : ref >= 1 ? 5 : ref >= 0.1 ? 6 : ref >= 0.01 ? 7 : 8;
              var pf = function(v) { return (+v).toFixed(dec); };
              var col = c >= o ? '#e74c3c' : '#27ae60';
              html += '<div style="color:' + col + '">开: ' + pf(o) + '</div>';
              html += '<div style="color:' + col + '">高: ' + pf(h) + '</div>';
              html += '<div style="color:' + col + '">低: ' + pf(l) + '</div>';
              html += '<div style="color:' + col + '">收: ' + pf(c) + '</div>';
              var di = p.dataIndex;
              if (di > 0 && ohlc[di - 1]) {
                var prevC = +ohlc[di - 1][1];
                if (prevC) {
                  var chg = c - prevC, chgPct = chg / prevC * 100;
                  html += '<div style="color:' + (chg >= 0 ? '#e74c3c' : '#27ae60') + '">涨跌: ' + (chg >= 0 ? '+' : '') + pf(chg) + ' (' + (chg >= 0 ? '+' : '') + chgPct.toFixed(2) + '%)</div>';
                }
              }
            }
          });
          return html + '</div>';
        }
      },
      axisPointer: { link: [{ xAxisIndex: 'all' }] },
      legend: {
        top: 2, right: 16, itemWidth: 14, itemHeight: 10, textStyle: { fontSize: 11 },
        data: ['K线', 'MA5', 'MA30', 'MA60', 'MA120', 'MA240', 'DIF', 'DEA', 'MACD', 'K', 'D', 'J', 'stop_loss_pct', 'risk_reward_ratio']
      },
      grid: [
        { left: 68, right: 20, top: 30, bottom: '48%' },
        { left: 68, right: 20, top: '52%', bottom: '36%' },
        { left: 68, right: 20, top: '64%', bottom: '20%' },
        { left: 68, right: 20, top: '82%', bottom: '6%' },
      ],
      xAxis: [
        { type: 'category', data: times, gridIndex: 0, scale: true, axisLabel: { show: false }, axisLine: { lineStyle: { color: '#ddd' } } },
        { type: 'category', data: times, gridIndex: 1, scale: true, axisLabel: { show: false }, axisLine: { lineStyle: { color: '#ddd' } } },
        { type: 'category', data: times, gridIndex: 2, scale: true, axisLabel: { show: false }, axisLine: { lineStyle: { color: '#ddd' } } },
        { type: 'category', data: times, gridIndex: 3, scale: true, axisLabel: { fontSize: 10, rotate: 20, color: '#888' }, axisLine: { lineStyle: { color: '#ddd' } } },
      ],
      yAxis: [
        { scale: true, gridIndex: 0, splitNumber: 5, axisLabel: { fontSize: 10, color: '#888' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
        { scale: true, gridIndex: 1, splitNumber: 3, axisLabel: { fontSize: 10, color: '#888', formatter: function(v) { return fsig(v, 4); } }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
        { scale: false, gridIndex: 2, splitNumber: 4, min: -30, max: 130, axisLabel: { fontSize: 10, color: '#888' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
        { scale: true, gridIndex: 3, splitNumber: 3, position: 'left', axisLabel: { fontSize: 10, color: '#e74c3c', formatter: function(v) { return v != null ? (+v).toFixed(2) + '%' : ''; } }, splitLine: { lineStyle: { color: 'rgba(231,76,60,0.2)' } } },
        { scale: true, gridIndex: 3, splitNumber: 3, position: 'right', axisLabel: { fontSize: 10, color: '#27ae60', formatter: function(v) { return v != null ? (+v).toFixed(2) : ''; } }, splitLine: { show: false } },
      ],
      dataZoom: [
        { type: 'inside', xAxisIndex: [0, 1, 2, 3], start: sp, end: ep },
        { type: 'slider', xAxisIndex: [0, 1, 2, 3], bottom: '1%', height: 20, start: sp, end: ep, borderColor: '#ddd', fillerColor: 'rgba(52,152,219,.12)', handleStyle: { color: '#3498db' }, textStyle: { fontSize: 10 } },
      ],
      series: [
        { name: 'K线', type: 'candlestick', xAxisIndex: 0, yAxisIndex: 0, data: ohlc,
          itemStyle: { color: '#e74c3c', color0: '#27ae60', borderColor: '#e74c3c', borderColor0: '#27ae60', borderWidth: 1 } },
        { name: 'MA5', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma5, smooth: false, symbol: 'none', lineStyle: { color: '#3498db', width: 1 }, itemStyle: { color: '#3498db' } },
        { name: 'MA30', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma30, smooth: false, symbol: 'none', lineStyle: { color: '#e74c3c', width: 1 }, itemStyle: { color: '#e74c3c' } },
        { name: 'MA60', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma60, smooth: false, symbol: 'none', lineStyle: { color: '#27ae60', width: 1 }, itemStyle: { color: '#27ae60' } },
        { name: 'MA120', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma120, smooth: false, symbol: 'none', lineStyle: { color: '#e67e22', width: 1 }, itemStyle: { color: '#e67e22' } },
        { name: 'MA240', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: ma240, smooth: false, symbol: 'none', lineStyle: { color: '#9b59b6', width: 1 }, itemStyle: { color: '#9b59b6' } },
        { name: 'MACD', type: 'bar', xAxisIndex: 1, yAxisIndex: 1, data: macd, markLine: { silent: true, symbol: 'none', lineStyle: { color: '#ccc', type: 'dashed', width: 1 }, data: [{ yAxis: 0 }], label: { show: false } } },
        { name: 'DIF', type: 'line', xAxisIndex: 1, yAxisIndex: 1, data: dif, smooth: false, symbol: 'none', lineStyle: { color: '#3498db', width: 1 }, itemStyle: { color: '#3498db' } },
        { name: 'DEA', type: 'line', xAxisIndex: 1, yAxisIndex: 1, data: dea, smooth: false, symbol: 'none', lineStyle: { color: '#e74c3c', width: 1 }, itemStyle: { color: '#e74c3c' } },
        { name: 'K', type: 'line', xAxisIndex: 2, yAxisIndex: 2, data: kLine, smooth: false, symbol: 'none', lineStyle: { color: '#3498db', width: 1 }, itemStyle: { color: '#3498db' },
          markLine: { silent: true, symbol: 'none', data: [{ yAxis: 10, lineStyle: { color: '#e74c3c', type: 'dashed', width: 1 }, label: { show: true, position: 'insideEndBottom', fontSize: 10, color: '#e74c3c', formatter: '10' } },
            { yAxis: 80, lineStyle: { color: '#ddd', type: 'dashed', width: 1 }, label: { show: true, position: 'insideEndBottom', fontSize: 10, color: '#bbb', formatter: '80' } }] } },
        { name: 'D', type: 'line', xAxisIndex: 2, yAxisIndex: 2, data: dLine, smooth: false, symbol: 'none', lineStyle: { color: '#f39c12', width: 1 }, itemStyle: { color: '#f39c12' } },
        { name: 'J', type: 'line', xAxisIndex: 2, yAxisIndex: 2, data: jLine, smooth: false, symbol: 'none', lineStyle: { color: '#9b59b6', width: 1 }, itemStyle: { color: '#9b59b6' } },
        { name: 'stop_loss_pct', type: 'line', xAxisIndex: 3, yAxisIndex: 3, data: stopLossPct, smooth: false, symbol: 'none', lineStyle: { color: '#e74c3c', width: 1 }, itemStyle: { color: '#e74c3c' } },
        { name: 'risk_reward_ratio', type: 'line', xAxisIndex: 3, yAxisIndex: 4, data: riskRewardRatio, smooth: false, symbol: 'none', lineStyle: { color: '#27ae60', width: 1 }, itemStyle: { color: '#27ae60' } },
      ],
    };

    chart.setOption(option);
    chart.setOption({
      graphic: [
        { type: 'text', id: 'ma-info', left: 74, top: 34, z: 100, style: { fill: '#555', fontSize: 11, fontFamily: '"Segoe UI","Microsoft YaHei",sans-serif', rich: RICH_MA, text: buildMAText(fi) } },
        { type: 'text', id: 'macd-info', left: 74, top: '52.5%', z: 100, style: { fill: '#555', fontSize: 11, fontFamily: '"Segoe UI","Microsoft YaHei",sans-serif', rich: RICH_MACD, text: buildMacdText(fi) } },
        { type: 'text', id: 'kdj-info', left: 74, top: '64.5%', z: 100, style: { fill: '#555', fontSize: 11, fontFamily: '"Segoe UI","Microsoft YaHei",sans-serif', rich: RICH_KDJ, text: buildKdjText(fi) } },
        { type: 'text', id: 'stop-risk-info', left: 74, top: '82.5%', z: 100, style: { fill: '#555', fontSize: 11, fontFamily: '"Segoe UI","Microsoft YaHei",sans-serif', rich: RICH_STOP_RISK, text: buildStopRiskText(fi) } },
      ],
    });

    chart.on('updateAxisPointer', function(e) {
      if (!e.axesInfo || !e.axesInfo.length) return;
      var idx = e.axesInfo[0].value;
      if (idx == null || idx < 0 || idx >= times.length) return;
      chart.setOption({
        graphic: [
          { id: 'ma-info', style: { text: buildMAText(idx), rich: RICH_MA } },
          { id: 'macd-info', style: { text: buildMacdText(idx), rich: RICH_MACD } },
          { id: 'kdj-info', style: { text: buildKdjText(idx), rich: RICH_KDJ } },
          { id: 'stop-risk-info', style: { text: buildStopRiskText(idx), rich: RICH_STOP_RISK } },
        ],
      });
    });
  }

  function onIntervalChange() {
    _currentInterval = document.getElementById('intervalSelect').value;
    var symbolToReload = _currentSymbol;
    loadSymbols().then(function() {
      if (symbolToReload && _filteredSymbols.some(function(s) { return s.symbol === symbolToReload; })) {
        loadKline(symbolToReload);
      } else if (symbolToReload) {
        _currentSymbol = null;
        document.getElementById('chartPlaceholder').style.display = 'flex';
        document.getElementById('chartPlaceholder').textContent = '点击左侧标的加载 K 线图';
        document.getElementById('klineChartWrap').style.display = 'none';
      }
    });
  }

  function loadSymbols() {
    var strategy = document.getElementById('strategySelect').value;
    showLoading(strategy ? '策略筛选中…' : '加载标的列表…');
    return fetchSymbols(_currentInterval, strategy)
      .then(function(symbols) {
        _allSymbols = symbols;
        _filteredSymbols = symbols;
        applyFilters();
        hideLoading();
      })
      .catch(function(err) {
        showError('无法加载标的列表：' + err.message);
      });
  }

  function init() {
    fetchStrategies().then(function(strategies) {
      initStrategySelect(strategies);
    }).catch(function() {
      initStrategySelect([{ id: '', name: '无' }, { id: 'jdj_ma', name: 'KDJ超卖+均线多头' }]);
    }).finally(function() {
      loadSymbols();
    });

    document.getElementById('intervalSelect').addEventListener('change', onIntervalChange);
    document.getElementById('strategySelect').addEventListener('change', function() {
      loadSymbols().then(function() {
        if (_currentSymbol && !_filteredSymbols.some(function(s) { return s.symbol === _currentSymbol; })) {
          _currentSymbol = null;
          document.getElementById('chartPlaceholder').style.display = 'flex';
          document.getElementById('chartPlaceholder').textContent = '点击左侧标的加载 K 线图';
          document.getElementById('klineChartWrap').style.display = 'none';
        }
      });
    });
    document.getElementById('symbolSearch').addEventListener('input', applyFilters);
    document.getElementById('btnReset').addEventListener('click', function() {
      document.getElementById('symbolSearch').value = '';
      applyFilters();
    });
    document.getElementById('btnSync').addEventListener('click', function() {
      var btn = document.getElementById('btnSync');
      var modal = document.getElementById('syncModal');
      var statusEl = document.getElementById('syncModalStatus');
      var progressEl = document.getElementById('syncModalProgress');
      var closeBtn = document.getElementById('syncModalClose');

      function showSyncModal() {
        modal.classList.add('show');
        statusEl.textContent = '准备中…';
        progressEl.classList.add('indeterminate');
        progressEl.style.width = '0%';
        closeBtn.style.display = 'none';
        modal.querySelector('.sync-modal').classList.remove('sync-done', 'sync-error');
      }
      function updateSyncModal(data) {
        var status = data.status;
        var msg = data.message || '同步中…';
        var percent = data.percent;
        var current = data.current;
        var total = data.total;

        statusEl.textContent = msg;
        progressEl.classList.remove('indeterminate');

        if (status === 'done') {
          progressEl.style.width = '100%';
          modal.querySelector('.sync-modal').classList.add('sync-done');
          closeBtn.style.display = 'inline-block';
        } else if (status === 'error') {
          progressEl.style.width = '100%';
          modal.querySelector('.sync-modal').classList.add('sync-error');
          closeBtn.style.display = 'inline-block';
        } else {
          modal.querySelector('.sync-modal').classList.remove('sync-done', 'sync-error');
          if (percent != null && total != null && total > 0) {
            progressEl.style.width = Math.min(100, Math.max(0, percent)) + '%';
          } else {
            progressEl.classList.add('indeterminate');
            progressEl.style.width = '';
          }
        }
      }
      function hideSyncModal() {
        modal.classList.remove('show');
      }

      btn.disabled = true;
      showSyncModal();

      fetch('/api/sync', { method: 'POST' })
        .then(function(r) { return r.ok ? r.json() : Promise.reject(new Error('启动同步失败')); })
        .then(function() {
          return new Promise(function(resolve, reject) {
            function poll() {
              fetch('/api/sync/status')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                  updateSyncModal(data);
                  if (data.status === 'done') {
                    resolve();
                  } else if (data.status === 'error') {
                    reject(new Error(data.message || '同步失败'));
                  } else {
                    setTimeout(poll, 1500);
                  }
                })
                .catch(reject);
            }
            poll();
          });
        })
        .then(function() {
          var symbolToReload = _currentSymbol;
          return loadSymbols().then(function() {
            if (symbolToReload && _filteredSymbols.some(function(s) { return s.symbol === symbolToReload; })) {
              loadKline(symbolToReload);
            }
          });
        })
        .catch(function(err) {
          updateSyncModal({ status: 'error', message: '数据同步失败：' + (err.message || err) });
        })
        .finally(function() {
          btn.disabled = false;
        });

    });
    document.getElementById('syncModalClose').addEventListener('click', function() {
      document.getElementById('syncModal').classList.remove('show');
    });
    document.getElementById('syncModal').addEventListener('click', function(ev) {
      if (ev.target.id === 'syncModal') ev.target.classList.remove('show');
    });
    document.querySelectorAll('.kline-list th[data-sort]').forEach(function(th) {
      th.addEventListener('click', function() {
        onHeaderClick(th.getAttribute('data-sort'));
      });
    });
  }

  window.addEventListener('resize', function() {
    if (_klineChart) _klineChart.resize();
  });

  init();
})();
</script>
</body>
</html>
