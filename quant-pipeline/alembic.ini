; Alembic 配置（仅管理 factors / ml schema；raw schema 由 NestJS 手写 SQL 管理）

[alembic]
script_location = src/quant_pipeline/db/migrations
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

; sqlalchemy.url 在 env.py 内部由 quant_pipeline.config.settings.PG_DSN 注入
; 这里留空避免被误用
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
